apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: cilium

namespace: kube-system

helmCharts:
  - name: cilium
    repo: https://helm.cilium.io
    releaseName: cilium
    namespace: kube-system
    version: 1.19.3 # make sure you update the Gateway API CRDs in the crds/kustomization.yaml file at the same time
                    # See compatibility here: https://docs.cilium.io/en/latest/network/servicemesh/gateway-api/gateway-api/
    valuesFile: ./values.yaml

resources:
  - ./resources/cilium-gateway.yaml
# Disabled these - best to install cilium fully before trying to use it or else it may not be able to install properly.
#   - ./resources/cilium-l2-announcement-policy.yaml
#   - ./resources/cilium-load-balancer-ip-pool.yaml


# Can use this command to check current running version of cilium: 
# kubectl -n kube-system get ds/cilium -o jsonpath='{.spec.template.spec.containers[0].image}'