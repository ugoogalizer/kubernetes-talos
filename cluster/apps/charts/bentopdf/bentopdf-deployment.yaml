# https://github.com/alam00000/bentopdf/#-run-with-docker-compose--podman-compose-recommended
--- # deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: bentopdf
  name: bentopdf
#  namespace: bentopdf
spec:
  selector:
    matchLabels:
      app: bentopdf
  template:
    metadata:
      labels:
        app: bentopdf
        app.kubernetes.io/name: bentopdf # required for Homepage
    spec:
      containers:
        - name: bentopdf
          image: ghcr.io/alam00000/bentopdf-simple:sha-58a0053 # as at 20260516
          # https://github.com/alam00000/bentopdf/pkgs/container/bentopdf-simple
          imagePullPolicy: Always
          env:
            - name: TZ
              value: "Australia/Sydney"
          ports:
            - containerPort: 8080
              name: bentopdf-http
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 750Mi
            limits:
              cpu: "250m"
              memory: "750Mi"
          livenessProbe:
            # as per: https://github.com/alam00000/bentopdf/blob/main/chart/values.yaml
            httpGet:
              path: /
              port: bentopdf-http
            initialDelaySeconds: 180
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: bentopdf-http
            initialDelaySeconds: 180
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bentopdf-http-svc
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: bentopdf-http
  selector:
    app: bentopdf
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bentopdf
  namespace: bentopdf
spec:
  parentRefs:
    - name: external-gateway
      namespace: kube-system
  hostnames:
    - "bentopdf.rockyroad.rocks"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: bentopdf-http-svc
          port: 8080

